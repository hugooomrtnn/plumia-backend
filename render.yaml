services:
  - type: web
    name: plumia-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: FREE_WORD_LIMIT
        value: "100000"
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
