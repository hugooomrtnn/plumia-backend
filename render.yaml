services:
  - type: web
    name: plumia-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: FREE_WORD_LIMIT
        value: "2000"
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: DATABASE_URL
        fromDatabase:
          name: plumia-db
          property: connectionString

databases:
  - name: plumia-db
    databaseName: plumia
    user: plumia
    plan: free
